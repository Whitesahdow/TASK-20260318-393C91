<section class="dashboard-shell role-dispatcher">
  <header class="dashboard-header">
    <h1>Task Dashboard</h1>
  </header>

  <main class="dashboard-grid stack">
    <article class="dashboard-card task-card">
      <div class="task-head">
        <h3>Workflow Queue</h3>
        <button type="button" (click)="batchApprove()">Batch Approve Selected</button>
      </div>
      <p *ngIf="loading">Loading tasks...</p>
      <p *ngIf="error" class="error-msg">{{ error }}</p>
      <div class="review-list" *ngIf="!loading && !error">
        <div class="review-item" *ngFor="let task of tasks">
          <label class="selector-row">
            <input
              type="checkbox"
              [checked]="selectedTaskIds.includes(task.id)"
              (change)="toggleSelection(task.id)"
            />
            <strong>{{ task.title }}</strong>
          </label>
          <div class="progress-bar">
            <div [style.width.%]="task.progress"></div>
          </div>
          <span class="status-pill" [ngClass]="task.branch.toLowerCase()">{{ task.status }} · {{ task.branch }}</span>
          <button type="button" (click)="returnTask(task.id)">Return</button>
          <button type="button" (click)="approveTask(task.id)">Approve</button>
        </div>
        <p *ngIf="tasks.length === 0">No tasks available.</p>
      </div>
    </article>
  </main>
</section>
